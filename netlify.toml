[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"

[images]
remote_images = [
  "https://cdn\\.builder\\.io/.*",
  "https://api\\.builder\\.io/.*"
]


[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"
  
[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"
